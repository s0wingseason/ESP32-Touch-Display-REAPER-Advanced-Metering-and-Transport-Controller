; MeterBridge ESP32 Firmware
; PlatformIO Configuration for Elecrow CrowPanel 7" ESP32-S3
;
; Board: ESP32-S3-WROOM-1-N4R8 (4MB Flash, 8MB OPI PSRAM)
; Display: 800x480 RGB TFT with GT911 capacitive touch
; Framework: Arduino + LovyanGFX + LVGL 8.3

[env:crowpanel_7inch]
platform = espressif32@6.4.0
board = esp32-s3-devkitc-1
framework = arduino

; === Pre-build scripts ===
extra_scripts = pre:fix_pgmspace.py

; === Serial & Upload ===
monitor_speed = 115200
upload_speed = 921600
monitor_filters = esp32_exception_decoder

; === Memory Configuration (4MB QIO Flash + 8MB OPI PSRAM) ===
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
board_build.flash_mode = qio
board_upload.flash_size = 4MB
board_build.partitions = huge_app.csv

; === Build Flags ===
build_flags = 
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=5
    ; LVGL configuration
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_MEM_CUSTOM=1
    -DLV_MEM_CUSTOM_ALLOC=ps_malloc
    -DLV_MEM_CUSTOM_FREE=free
    -DLV_MEM_CUSTOM_REALLOC=ps_realloc
    -DLV_TICK_CUSTOM=1
    -DLV_COLOR_DEPTH=16
    -DLV_COLOR_16_SWAP=0
    -DLV_USE_LOG=0
    -DLV_FONT_MONTSERRAT_12=1
    -DLV_FONT_MONTSERRAT_14=1
    -DLV_FONT_MONTSERRAT_16=1
    -DLV_FONT_MONTSERRAT_20=1
    -DLV_FONT_MONTSERRAT_24=1
    -DLV_FONT_MONTSERRAT_28=1
    -DLV_FONT_MONTSERRAT_36=1
    -DLV_FONT_MONTSERRAT_48=1
    -DLV_USE_METER=1
    -DLV_USE_CHART=1
    -DLV_USE_BAR=1
    -DLV_USE_SLIDER=1
    -DLV_USE_BTNMATRIX=1
    -DLV_USE_LABEL=1
    -DLV_USE_ARC=1
    -DLV_USE_CANVAS=1
    -DLV_USE_ANIMIMG=0
    -DLV_USE_THEME_DEFAULT=1
    -DLV_THEME_DEFAULT_DARK=1
    -DLV_USE_ANIM=1
    -DLV_DISP_DEF_REFR_PERIOD=16
    ; Shared protocol include path
    -I../shared
    ; LVGL needs to find lv_conf.h in src/
    -Isrc

; === Library Dependency Finder ===
lib_ldf_mode = deep+

; === Library Dependencies ===
lib_deps = 
    lvgl/lvgl@~8.3.11
    lovyan03/LovyanGFX@1.1.12
    tamctec/TAMC_GT911@^1.0.2
    bblanchon/ArduinoJson@^7.0.0

; Extra source directories
lib_extra_dirs = 
    ../shared

; ══════════════════════════════════════════════════════════════
; OTA (Over-The-Air) Upload Environment
; Usage: pio run -e crowpanel_7inch_ota -t upload
; NOTE: Flash via USB first. OTA is for subsequent updates only.
;       Reuses the base env's compiled objects — no recompile needed.
; ══════════════════════════════════════════════════════════════

[env:crowpanel_7inch_ota]
extends = env:crowpanel_7inch
upload_protocol = espota
upload_port = meterbridge.local    ; mDNS hostname set in ArduinoOTA.setHostname()
; Share the base env's build dir — OTA is upload-only, binary is identical
build_dir = .pio/build/crowpanel_7inch
upload_flags = 
    --port=3232
