<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudioBeacon Settings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="settings.css">
</head>

<body>
    <div class="settings-container">
        <header class="settings-header">
            <h1>StudioBeacon</h1>
            <p>Display Settings</p>
        </header>

        <!-- Display Section -->
        <section class="settings-section">
            <h2>Display</h2>
            <div class="setting-row">
                <label for="monitorSelect">Target Monitor</label>
                <select id="monitorSelect"></select>
            </div>
            <div class="setting-row">
                <label for="fullscreenToggle">Fullscreen Mode</label>
                <input type="checkbox" id="fullscreenToggle" checked>
            </div>
            <div class="setting-row">
                <label for="alwaysOnTopToggle">Always on Top</label>
                <input type="checkbox" id="alwaysOnTopToggle" checked>
            </div>
        </section>

        <!-- Theme Section -->
        <section class="settings-section">
            <h2>Theme</h2>
            <div class="setting-row">
                <label for="bgColor">Background Color</label>
                <input type="color" id="bgColor" value="#0d0d12">
            </div>
            <div class="setting-row">
                <label for="accentPrimary">Primary Accent (Recording)</label>
                <input type="color" id="accentPrimary" value="#FF4D6D">
            </div>
            <div class="setting-row">
                <label for="accentSecondary">Secondary Accent (Playing)</label>
                <input type="color" id="accentSecondary" value="#4DEDAB">
            </div>
            <div class="setting-row">
                <label for="textPrimary">Primary Text</label>
                <input type="color" id="textPrimary" value="#FFFFFF">
            </div>
            <div class="setting-row">
                <label for="textSecondary">Secondary Text</label>
                <input type="color" id="textSecondary" value="#8B8BA3">
            </div>
        </section>

        <!-- Typography Section -->
        <section class="settings-section">
            <h2>Typography</h2>
            <div class="setting-row">
                <label for="fontFamily">Font Family</label>
                <select id="fontFamily">
                    <option value="Inter">Inter</option>
                    <option value="Roboto">Roboto</option>
                    <option value="SF Pro Display">SF Pro Display</option>
                    <option value="Helvetica Neue">Helvetica Neue</option>
                    <option value="Outfit">Outfit</option>
                </select>
            </div>
            <div class="setting-row">
                <label for="statusSize">Status Text Size</label>
                <input type="range" id="statusSize" min="60" max="200" value="140">
                <span class="range-value" id="statusSizeValue">140px</span>
            </div>
            <div class="setting-row">
                <label for="metadataSize">Metadata Text Size</label>
                <input type="range" id="metadataSize" min="16" max="48" value="28">
                <span class="range-value" id="metadataSizeValue">28px</span>
            </div>
        </section>

        <!-- Effects Section -->
        <section class="settings-section">
            <h2>Effects</h2>
            <div class="setting-row">
                <label for="glowIntensity">Glow Intensity</label>
                <input type="range" id="glowIntensity" min="0" max="100" value="80">
                <span class="range-value" id="glowIntensityValue">80%</span>
            </div>
            <div class="setting-row">
                <label for="particlesToggle">Ambient Particles</label>
                <input type="checkbox" id="particlesToggle" checked>
            </div>
        </section>

        <!-- Visibility Section -->
        <section class="settings-section">
            <h2>Metadata Visibility</h2>
            <div class="setting-row">
                <label for="showProjectName">Project Name</label>
                <input type="checkbox" id="showProjectName" checked>
            </div>
            <div class="setting-row">
                <label for="showTimecode">Timecode</label>
                <input type="checkbox" id="showTimecode" checked>
            </div>
            <div class="setting-row">
                <label for="showBarsBeats">Bars / Beats</label>
                <input type="checkbox" id="showBarsBeats" checked>
            </div>
            <div class="setting-row">
                <label for="showRegionName">Region Name</label>
                <input type="checkbox" id="showRegionName" checked>
            </div>
            <div class="setting-row">
                <label for="showTempo">Tempo</label>
                <input type="checkbox" id="showTempo">
            </div>
            <div class="setting-row">
                <label for="showDateTime">Date / Time</label>
                <input type="checkbox" id="showDateTime" checked>
            </div>
            <div class="setting-row">
                <label for="showSessionTimer">Session Timer</label>
                <input type="checkbox" id="showSessionTimer" checked>
            </div>
        </section>

        <!-- Studio Section -->
        <section class="settings-section">
            <h2>Studio Info</h2>
            <div class="setting-row">
                <label for="studioName">Studio Name</label>
                <input type="text" id="studioName" placeholder="Your Studio Name">
            </div>
            <div class="setting-row">
                <label for="engineerName">Engineer Name</label>
                <input type="text" id="engineerName" placeholder="Engineer Name">
            </div>
        </section>

        <!-- Network Section -->
        <section class="settings-section">
            <h2>Network</h2>
            <div class="setting-row">
                <label for="wsPort">WebSocket Port</label>
                <input type="number" id="wsPort" value="9999" min="1024" max="65535">
            </div>
            <div class="connection-status" id="connectionStatus">
                <span class="status-dot disconnected"></span>
                <span>Waiting for VST connection...</span>
            </div>
        </section>

    <!-- Actions -->
    <div class="settings-actions">
        <button class="btn btn-secondary" id="resetDefaults">Reset to Defaults</button>
        <button class="btn btn-primary" id="saveSettings">Save Settings</button>
    </div>
    </div>

    <script src="settings.js"></script>
</body>

</html>
